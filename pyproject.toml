# Workspace-wide tooling config.
#
# Testing standard: pytest. Tests live in a `tests/` directory at the relevant
# scope — `tests/` at the repo root for workspace-level tests, and `tests/`
# inside a project for project-scoped tests. Each `tests/` dir owns a `log/`
# subdir (gitignored) where timestamped run logs are written.
#
# No `testpaths` is set on purpose: this is a multi-project workspace, so you
# select what to run by passing a path, e.g. `pytest tests/` or
# `pytest projects/fb-group-search/tests/`.

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -v"
markers = [
    "integration: exercises real external systems (WSL2/tmux, browsers, network) — not hermetic",
    "slow: takes many seconds (TUI startup, live model responses)",
]

# Console logging — concise, human-readable (preserves the old PASS/FAIL feel).
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(levelname)-7s %(name)s | %(message)s"
log_cli_date_format = "%H:%M:%S"

# File logging — verbose/debug. The actual file path is set per-run in each
# suite's conftest.py (timestamped, written into that suite's tests/log/).
log_file_level = "DEBUG"
log_file_format = "%(asctime)s %(levelname)-7s %(name)s | %(message)s"
log_file_date_format = "%Y-%m-%d %H:%M:%S"
