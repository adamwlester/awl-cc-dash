document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>AWL Multi-Agent Dashboard — v9p8-alt (neobrutalism)<\u002Ftitle>\n  <!--\n    v9p8-alt — Claude design pass on v9p7 (overrides only; every id, handler, panel and\n    behavior preserved). Goal: a calmer, more navigable cockpit while staying fully inside the\n    neobrutalism.dev + Happy Hues 17 language — NO new semantic colors are introduced.\n      • PAPER & SURFACE DEPTH: canvas warmed/deepened (#fef6e4 → #fdf2e0), chrome given more\n        contrast (#f5ecd9 → #f3e6ca) so the five panel headers/footers separate from their cream\n        bodies; a faint top-down paper wash on the app shell so the frame reads as paper, not a flat\n        fill. Cards stay crisp white to pop.\n      • PANEL WAYFINDING: each panel header gains a small monochrome glyph chip (Agent · Team Graph ·\n        Documentation · Feed · Prompts) so the cockpit is scannable at a glance; headers are a touch\n        taller with tighter tracking. data-screen-label added to each panel for review context.\n      • ELEVATION DISCIPLINE: a clear 3-tier system — recessed wells (flat), resting cards (2px\n        border + 2px shadow), raised/primary (2px border + 4px shadow). Resting cards get a 1px\n        inner top-highlight for a printed-paper crispness; hover still presses into the page.\n      • TYPE RHYTHM: readout bodies nudged up for legibility; muted metadata de-bolded so the eye\n        rests. Health bars + status badges slightly larger/clearer.\n    All changes live in the \"v9p8-alt design pass\" <style> block + 5 header glyphs; the original\n    cascade is untouched, so reverting is a single-block delete.\n\n    ----- previous changelog (v9p7 and earlier, unchanged) -----\n    v9p7 — four backlog items (A1–A4); adds a Documentation panel + reflows the 3-pane frame:\n      • CONTEXT CUTOFF SHADING (A1): every context usage bar now grays out the region above the\n        cutoff so the real usable limit is visible. A hatched overlay (.bar-cut) covers cutoff→100%\n        with a 2px muted marker line at the cutoff. Applied to the Team Graph card bars (.pbar), the\n        Agent panel summary bar (.ctxbar / #ctx-bar), and the breakdown bar (.bd-bar). The fill still\n        renders underneath, so a bar that runs past the cutoff (e.g. reviewer-01 vega at 88%) reads as\n        over-limit. Cutoff = 80% (the common per-agent Context% auto-stop default); the JS-built bars\n        read window.CTX_CUTOFF.\n      • TURNS OWN LINE (A2): on each Team Graph card, \"Turns n/max\" moves onto its own line above the\n        context bar+% row (was sharing the row). The bar+% keep their own line below it.\n      • DOCUMENTATION PANEL (A3): a new \"Documentation\" panel — the home for organizing all docs.\n        Tabs: Plan · README.md · CLAUDE.md · TODO.md (plus a \"+\" add-doc affordance). Plan hosts the\n        native-plan interface (backlog C4): a list of plans, each an expandable card with a step\n        checklist and Review/Edit/Approve · Reject actions, including an ultraplan entry. The three\n        file tabs are a doc viewer — a path chip + Copy + an Edit toggle that swaps the rendered view\n        for a mono textarea. Content is grounded to this workspace, kept representative like the rest\n        of the mockup. New JS: switchTab('doc',…) reuse, docEdit(), togglePlan(), planAct().\n      • MAIN LAYOUT RECONFIG (A4): the 3-pane frame is reflowed so the reading order (top-to-bottom,\n        then left-to-right) is Agent · Team Graph · Documentation · Feed · Prompts.\n          – LEFT  : Agent (full height, unchanged).\n          – MIDDLE: a vertical split — Team Graph (top) / Documentation (bottom).\n          – RIGHT : a NEW vertical split — Feed (top) / Prompts (bottom). Prompts moved here from the\n            middle column; Feed gained a split partner. All ids/handlers preserved (Prompts keeps\n            #pPrompts, #prompt-targets, #prompt-actions; replyTo's reply-flash still targets #pPrompts).\n        The generic .rz-handle resizer already handles arbitrary nested groups, so the new right-column\n        split + the swapped middle-column panel resize without any JS change.\n    v9p6 — agent selection lists hug their content (no color/behavior change otherwise):\n      • The persistent agent-row lists — Prompts → Target (#prompt-targets) and Team Feed → Filter —\n        now SIZE TO THEIR CONTENT instead of stretching to fill the column (flex-1 → flex-initial,\n        i.e. flex:0 1 auto). When few agents are listed the list is short and the space below it is\n        the cream content surface, rather than a tall stretched box.\n      • They still keep min-height:0 + overflow-y:auto, so when the pane is resized too small to fit\n        the rows, the list shrinks and scrolls vertically inside its bounded column.\n      • The Source list stays a dropdown popout (already scrolls); Settings is unaffected.\n      FIXES (post-review — \"no scrollbar\" + \"Prompts footer not anchored\"):\n      • Scroll actually works now: the base .aglist{overflow:hidden} (corner-clipping) was silently\n        overriding Tailwind's overflow-y-auto, so the lists clipped with NO scrollbar. Added a\n        higher-specificity .aglist.aglist-scroll{overflow-y:auto} and tagged the two lists with it.\n      • Prompts footer stays anchored: the splitter resizer set flex:'0 0 Npx' (fixed, no shrink), so\n        after ANY splitter drag the Team Graph could no longer shrink on window resize — it overflowed\n        the middle column and pushed the Prompts footer off-screen (the Feed, a single panel, was\n        unaffected). The resizer now sets flex-GROW proportions ('Npx 1 0' → grow N, shrink 1, basis\n        0), so panels stay responsive and shrinkable after dragging. Verified across window + splitter\n        resizes in Playwright.\n    v9p5 — content surface goes cream (no layout/behavior change, no Settings change):\n      • Panel/tab CONTENT AREAS now use the canvas cream (--background #fef6e4) as their background\n        surface — matching the Team Graph well, which already did. Previously the Agent body, the\n        Prompts body (Source/Target column + Compose/Library/History), the Team Feed body, and the\n        four feed tab wells (Messages/Scratch/Log/Requests) were white (--secondary-background).\n        The 3-pane frame (.rz-group.horizontal) and the default .pcard-body also go cream.\n      • Discrete components are unchanged and keep their own fills so they pop on cream — exactly like\n        Team Graph cards: raised cards (.node/.rcard), inputs & selector fields (.in, pickers,\n        combos, msel), agent-row lists (.aglist), menus/popouts, segmented controls, and the\n        chrome headers/footers (--surface-3).\n      • The Settings step-into view (.settings-view / .set-*) is deliberately UNCHANGED.\n    v9p4 — adds a top-level SETTINGS panel (no color-system change, no change to the 3-pane UI):\n      • New gear button in the title bar (right cluster, beside the WSL2 / tmux / Connected chips)\n        opens a STEP-INTO full-window Settings view that toggles in/out over the 3-pane body — not a\n        fourth always-on column, and not a floating popup (it's a flat bordered surface that covers\n        the body between the title bar and footer; the 3-pane view returns on Close).\n      • Tabs are by SUBJECT, not elevation: Usage · MCP · Plugins · Config · Setups. Inside MCP,\n        Plugins, and Config, SCOPE (user/project/local · global/project) is a secondary segment — a\n        subject is never split across tabs.\n          – Usage: plan, limits, token consumption (the /stats · /status surface). Usage only — no\n            dollar/cost spend (out of scope per the README).\n          – MCP: server registry with enable/disable, connection/OAuth health, and the disabled-server\n            \"parking\" state. Scope: user / project.\n          – Plugins: installed + enabled state, and marketplaces. Scope: user / project / local.\n          – Config: default model, permission mode, sandbox, hooks, env, CLAUDE.md, plans. Scope:\n            global / project. Each setting marked LIVE vs NEW SESSION per the CLI lifecycle map.\n          – Setups: the full Save/Load setup functionality (the footer keeps a glanceable shortcut).\n      • Read-only status/health/usage is visually separated from editable config within each tab;\n        edits to global (~/.claude) config are gated behind an explicit confirm.\n      • This panel owns the GLOBAL registry + enablement of MCP servers and plugins; per-agent scoping\n        stays in the Agent panel (it does not duplicate it).\n      • Footer keeps glanceable quick-access (Save/Load -> Setups · token pill -> Usage); the panel holds\n        the full detail.\n      • Content is grounded to THIS machine (real MCP servers, installed plugins, models, hooks, env),\n        kept representative like the rest of the mockup.\n    v9p3 — four component tweaks on v9p2 (no color-system change):\n      • Agent → History (Rewind/Handoff) now behaves like Agent → Model: a standard (fully-rounded)\n        button group with the timeline as a separate popout that's HIDDEN until a mode is selected —\n        and, unlike Model, BOTH Rewind and Handoff can be toggled off (back to hidden).\n      • Agent → Model buttons restyled as a standard (fully-rounded) button group; the version list\n        opens as a separate rounded popout below (was flat-bottom tabs fused to the panel).\n      • Agent → Details status badge now matches the Team Graph card status badge (.node-badge nb-*,\n        solid status fill, uppercase) instead of the old dot-in-chip.\n      • \"Link Agents\" is now a standard icon+text button (.btn) instead of the amber text link.\n    v9p2 — button/selector taxonomy cleanup on v9p1 (color only), grounded in Material 3 color roles\n    + Carbon button hierarchy. One emphasis ladder: PINK = primary, TEAL = secondary, CREAM = low,\n    RED = danger. Refinements vs v9p1:\n      • Low-emphasis ACTION buttons move off stark white onto a warm cream (--surface-btn #fbf5e8):\n        .btn, .btn-danger, .fmt-btn (Response), .tl-ic, .fill-btn, .dir-cyc. Form inputs & selector\n        FIELDS (.in, Color/Icon/Role/Source/Skills/Tools triggers, steppers) stay white — fillable\n        surfaces read distinct from clickable low-emphasis buttons.\n      • Response is a MENU selector, so its trigger is now neutral (cream), NOT teal-when-active; the\n        \"N selected\" state reads from a teal count badge + teal selected pills inside the menu.\n        (Rule: inline selectors show selection in place as a teal fill — segmented/tabs/toggles; menu\n        selectors keep a neutral trigger and put teal on the value/options + a count badge.)\n      • Revise stays the single TEAL tonal secondary action (Material \"filled tonal\"); Send stays\n        fully pink incl. its dim dropdown chip (a parameter of a primary action, not a standalone state).\n    v9p1 — accent rebalance (color only, no layout/behavior change). Pink was overloaded (brand +\n    primary action + tabs + segmented/toggle state + selection), so it read as \"loud.\" New rule:\n      • PINK (--main) is reserved for: primary commit actions (Send, Apply, .btn-main), the active\n        PANEL TAB (.tab-btn), count badges (.req-badge / token pill), and the title bar / brand flash.\n      • TEAL (--secondary #8bd3dd) becomes the workhorse \"state\" accent: active segmented controls\n        & value pickers (Mode/Effort/Trigger/model/format), all on-toggles (Fast/Think/limit/mini),\n        selection rings (color & icon pickers), the active template pill, and hover affordances.\n      • --select (selection FILL behind navy text) changes from muted pink #f9cbdf to a light teal\n        #a9dde7 — so every selected list row AND card (graph nodes, History, Messages) reads teal.\n      The agent-identity Jewel palette and all semantic/signal tones (success/warning/danger/req ramp)\n      are unchanged; teal UI tints stay in a lighter register than the deep identity blues.\n    v8p9 — minor visual/interaction tweaks on v8p8 (no design-language change). Highlights:\n      • Revise split button label now reads \"Revise: <scope>\" (e.g. \"Revise: Grammar\") and tracks the picked scope\n      • selected cards (Team Graph · Prompts → History · Feed → Messages) use a light-pink fill (was a pink ring); the Team Graph \"VIEWING\" badge is removed\n      • Agent → History timeline: removed the bright-pink fill on the current (\"now\") row (the \"now\" pill still marks it)\n    v8p8 — agent-config + feed interaction pass on v8p7 (no design-language change). Highlights:\n      • voice-dictation mic moved out of the Compose header into the shared Prompts footer (first control)\n      • Mode block now also hosts Opus Fast mode (/fast) + Thinking as toggles, beneath the permission-mode segmented control\n      • Team Graph cards show a health-colored \"Turns n/max\" count inline, immediately before the context bar\n      • Feed tab order: Requests is now last (Messages · Scratch · Log · Requests)\n      • Messages cards are multi-selectable (like History), with a new Messages footer — Copy · Summarize · Share\n    v8p7 — layout + interaction refinements on v8p6 (no design-language change). Highlights:\n      • Prompts → Library: selecting a placeholder no longer tints the fill textarea border (the field's placeholder still names the active tag)\n      • shared agent selector: Source is now a compact dropdown stacked above Target (one shared column)\n      • Feed tab panels (Messages/Requests/Scratch/Log + the Messages sub-bar) are now white, like Prompts → History\n      • main UI is full-bleed (header, 3-pane frame, footer meet flush — no outer cream margin)\n      • Prompts → History: cards are selectable and styled like the Team Graph cards; per-card actions moved to one footer — Copy · Edit · Retry · Stop (text+icon buttons)\n      • Response format: TLDR moved under Structure (no longer its own group)\n    v8p6 — interaction + consistency pass on v8p5 (no design-language change). Highlights:\n      • per-agent Thinking on/off toggle (Agent → Details/Create, inline trailing the Mode group) + shown on graph cards\n      • context bars (graph cards + Agent panel summary) now health-colored (reuses the Timeline ctxColor scale)\n      • graph status dot → rectangular status badge (top-right), a button that jumps to Requests/History/Compose\n      • removed the (non-working) Team Graph link lines (revisit when proper link edges land — C17)\n      • Mode \"Fuckit\" → \"FREE!\"; Prompts → History \"Sent\" badge → \"Active\"/\"Complete\"\n      • Agent → Details History timeline fills remaining panel space; Target list leads with Scratch\n      • Compose heading \"Compose · free prompt\" → \"Compose\" + inline mic (voice dictation) button\n      • Response format gains a TLDR group; Role/Skills/Tools became dropdowns (agent.md / skills files / native tools)\n      • demo-data consistency fixes (e.g. Agent → Context summary bar now renders a 40% fill to match its label)\n    v8p5 — refactor onto the neobrutalism.dev design language (https://www.neobrutalism.dev).\n    v8p5 change (color only): swapped the 16 agent identity colors to the \"Jewel\" family — an even,\n    deep OKLCH set (oklch 0.52 0.15 · 16 evenly-spaced hues) — and relabeled the agent tokens to match.\n    No other changes vs v8p4. (v8p4 tokenized the split-button drop shades --main-dim / --secondary-dim.)\n    Token names + utility classes mirror the library's Tailwind v4 theme so this static mockup\n    ports ~1:1 to the real React/shadcn build:\n      colors  : bg-main · bg-secondary-background · bg-background · text-foreground · text-main-foreground · border-border\n      shadow  : shadow-shadow (hard offset, no blur)   radius: rounded-base   weights: font-base / font-heading\n      press   : hover:translate-x-boxShadowX hover:translate-y-boxShadowY hover:shadow-none\n    Agent icons : game-icons.net (CC-BY 3.0), recolorable — tile bg = currentColor (agent color), glyph = var(--icon-fg).\n    UI icons    : Lucide (ISC), via CDN here; source SVGs kept in assets/icons/ui/{actions,nav,status,domain}.\n    Font        : Archivo (heading 800 / base 500) + JetBrains Mono for metrics.\n  -->\n  <!-- v9p8-alt standalone: Tailwind Play CDN replaced with the exact CSS it generated for this\n       page (Tailwind v3.4.17 preflight + the utilities this markup uses) so the file works fully\n       offline. Regenerate by re-running the page through the Play CDN and extracting its <style>. -->\n  <style id=\"tw-static\">*, ::before, ::after{--tw-border-spacing-x:0;--tw-border-spacing-y:0;--tw-translate-x:0;--tw-translate-y:0;--tw-rotate:0;--tw-skew-x:0;--tw-skew-y:0;--tw-scale-x:1;--tw-scale-y:1;--tw-pan-x: ;--tw-pan-y: ;--tw-pinch-zoom: ;--tw-scroll-snap-strictness:proximity;--tw-gradient-from-position: ;--tw-gradient-via-position: ;--tw-gradient-to-position: ;--tw-ordinal: ;--tw-slashed-zero: ;--tw-numeric-figure: ;--tw-numeric-spacing: ;--tw-numeric-fraction: ;--tw-ring-inset: ;--tw-ring-offset-width:0px;--tw-ring-offset-color:#fff;--tw-ring-color:rgb(59 130 246 / 0.5);--tw-ring-offset-shadow:0 0 #0000;--tw-ring-shadow:0 0 #0000;--tw-shadow:0 0 #0000;--tw-shadow-colored:0 0 #0000;--tw-blur: ;--tw-brightness: ;--tw-contrast: ;--tw-grayscale: ;--tw-hue-rotate: ;--tw-invert: ;--tw-saturate: ;--tw-sepia: ;--tw-drop-shadow: ;--tw-backdrop-blur: ;--tw-backdrop-brightness: ;--tw-backdrop-contrast: ;--tw-backdrop-grayscale: ;--tw-backdrop-hue-rotate: ;--tw-backdrop-invert: ;--tw-backdrop-opacity: ;--tw-backdrop-saturate: ;--tw-backdrop-sepia: ;--tw-contain-size: ;--tw-contain-layout: ;--tw-contain-paint: ;--tw-contain-style: }::backdrop{--tw-border-spacing-x:0;--tw-border-spacing-y:0;--tw-translate-x:0;--tw-translate-y:0;--t 02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0e326544-1562-4913-90b9-d6827c6a18a2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"8eb21394-1568-4982-83b7-af5f63e7e853\"><\u002Fscript>\n  <script>\n    var tailwind = window.tailwind || {};   /* v9p8-alt standalone: runtime removed; config kept inert (CSS is pre-generated above) */\n    tailwind.config = { theme: { extend: {\n      fontFamily: { sans:['Archivo','sans-serif'], mono:['JetBrains Mono','monospace'] },\n      fontWeight: { base:'500', heading:'800' },\n      colors: {\n        background:'var(--background)', 'secondary-background':'var(--secondary-background)',\n        foreground:'var(--foreground)', main:'var(--main)', 'main-foreground':'var(--main-foreground)',\n        border:'var(--border)', ring:'var(--ring)', overlay:'var(--overlay)',\n        surface3:'var(--surface-3)', muted:'var(--muted)', 'muted-2':'var(--muted-2)',\n        secondary:'var(--secondary)', 'secondary-foreground':'var(--secondary-foreground)', select:'var(--select)',\n        'main-dim':'var(--main-dim)', 'secondary-dim':'var(--secondary-dim)',\n        success:'var(--success)', warning:'var(--warning)', danger:'var(--danger)',\n        agent: { crimson:'#aa3a61', emerald:'#008149', cobalt:'#006bbb', amber:'#aa4600', fern:'#387b12',\n          violet:'#7152b5', vermilion:'#af3c3a', cyan:'#007f91', gold:'#9d5400', citron:'#876300',\n          orchid:'#8b48a0', azure:'#0076ab', teal:'#008370', lime:'#687100', indigo:'#4d5ebe', magenta:'#9e3f84' }\n      },\n      borderRadius: { base:'var(--radius-base)' },\n      boxShadow: { shadow:'var(--shadow)', shadowsm:'var(--shadow-sm)' },\n      spacing: { boxShadowX:'4px', boxShadowY:'4px', reverseBoxShadowX:'-4px', reverseBoxShadowY:'-4px' }\n    }}}\n  <\u002Fscript>\n  <style>\n    /* ============================ neobrutalism tokens (names mirror the library) ============================ */\n    :root{\n      --background:#fdf2e0; --secondary-background:#ffffff; --foreground:#001858; --main-foreground:#001858;\n      --main:#f582ae; --border:#001858; --ring:#8bd3dd; --overlay:rgba(0,24,88,0.55);\n      /* Happy Hues 17 secondary (teal) — now the workhorse STATE accent (segmented/toggles/rings); --select is a light teal selection FILL (was muted pink #f9cbdf) */\n      --secondary:#8bd3dd; --secondary-foreground:#001858; --select:#a9dde7;\n      /* \"dim\" = the dropdown CHIP half of each split button — a LIGHTER tint of its action accent (chip recedes, action leads). Both directions now consistent: Send chip light pink + full-pink action mirrors Revise's light-teal chip + full-teal action. (was --main-dim:#ef7aa6, a darker shade — inconsistent) */\n      --main-dim:#f9b9d2; --secondary-dim:#bfe6ec;\n      --spacing-boxShadowX:4px; --spacing-boxShadowY:4px; --spacing-reverseBoxShadowX:-4px; --spacing-reverseBoxShadowY:-4px;\n      --shadow:4px 4px 0 0 var(--border); --shadow-sm:2px 2px 0 0 var(--border);\n      --radius-base:5px; --font-weight-base:500; --font-weight-heading:800;\n      /* extensions — 3 warm surfaces only: canvas (background) · cards (secondary-background, white) · chrome (surface-3) */\n      --surface-3:#f3e6ca; --muted:#5b5f86; --muted-2:#9a93b4; --rule:#dccfb2;\n      /* v9p2: low-emphasis ACTION buttons sit on a warm cream (softer than white, lighter than chrome so they still pop on surface-3 footers); form inputs & selector fields stay white */\n      --surface-btn:#fbf3e2;\n      --success:#2f9e6f; --warning:#d98a2b; --danger:#d23b6a;\n      --req-permission:#d23b4a; --req-approval:#cf7a2c; --req-decision:#a9710f;\n      --ag-user:#7b7fa6;\n      /* glyph fill for agent tiles: white so identity reads on every colored tile. Set transparent for pure knockout. */\n      --icon-fg:#ffffff;\n    }\n    *{ scrollbar-width:thin; scrollbar-color:var(--muted) var(--surface-3); }\n    ::-webkit-scrollbar{ width:9px; height:9px; }\n    ::-webkit-scrollbar-track{ background:var(--surface-3); border-left:2px solid var(--border); }\n    ::-webkit-scrollbar-thumb{ background:var(--muted); border:2px solid var(--border); }\n    ::-webkit-scrollbar-thumb:hover{ background:var(--secondary); }\n    body{ font-weight:var(--font-weight-base); }\n    h1,h2,h3,h4,h5{ font-weight:var(--font-weight-heading); }\n    svg.lucide{ display:inline-block; vertical-align:middle; flex:0 0 auto; }\n\n    /* ============================ app shell ============================ */\n    .app{ height:100vh; display:flex; flex-direction:column; overflow:hidden; background:var(--background); position:relative; }   /* v9p4: positioning context for the step-into Settings view */\n    .three{ flex:1 1 auto; padding:0; min-height:0; overflow:hidden; }   /* v8p7: full-bleed — frame meets header/footer & window edges */\n\n    /* ============================ Resizable (mirrors neobrutalism Resizable) ============================ */\n    .rz-group{ display:flex; height:100%; min-height:0; min-width:0; }\n    .rz-group.horizontal{ flex-direction:row; border-left:none; border-right:none; border-top:2px solid var(--border); border-bottom:2px solid var(--border);\n      border-radius:0; background:var(--background); overflow:hidden; }   /* v8p7: full-bleed (square, no outer shadow). v9p5: cream content surface (was white) */\n    .rz-group.vertical{ flex-direction:column; width:100%; height:100%; }\n    .rz-panel{ display:flex; flex-direction:column; min-width:0; min-height:0; overflow:hidden; position:relative; }\n    .rz-handle{ position:relative; z-index:6; flex:0 0 auto; display:flex; align-items:center; justify-content:center; }\n    .rz-handle.vstyle{ width:10px; margin:0 -4px; cursor:col-resize; }\n    .rz-handle.hstyle{ height:10px; margin:-4px 0; cursor:row-resize; }\n    .rz-handle::before{ content:''; position:absolute; background:var(--border); }\n    .rz-handle.vstyle::before{ top:0; bottom:0; left:50%; width:2px; transform:translateX(-50%); }\n    .rz-handle.hstyle::before{ left:0; right:0; top:50%; height:2px; transform:translateY(-50%); }\n    .rz-handle:hover::before{ background:var(--secondary); }\n    .rz-grip{ position:relative; z-index:2; display:flex; align-items:center; justify-content:center;\n      background:var(--secondary-background); border:2px solid var(--border); border-radius:3px; color:var(--foreground); }\n    .rz-handle.vstyle .rz-grip{ width:11px; height:24px; }\n    .rz-handle.hstyle .rz-grip{ width:24px; height:11px; }\n    .rz-handle.hstyle .rz-grip svg{ transform:rotate(90deg); }\n    .rz-handle:hover .rz-grip{ background:var(--secondary); }\n\n    /* ============================ panel internals ============================ */\n    .pcard-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0;\n      height:36px; min-height:36px; padding:0 10px; background:var(--surface-3); border-bottom:2px solid var(--border); }\n    .pcard-head h3{ font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--foreground); white-space:nowrap; }\n    .pcard-body{ flex:1 1 auto; min-height:0; background:var(--background); }   /* v9p5: cream is the content surface for all panel bodies (matches the Team Graph well); cards/inputs/lists keep their own fills so they pop. The Settings step-into view is separate (.set-*) and unaffected. */\n    .pcard-foot{ flex-shrink:0; background:var(--surface-3); border-top:2px solid var(--border); }\n    .panel-divider{ border-bottom:2px solid var(--border); }    /* between stacked panels in a group, when no handle */\n    .rz-panel + .rz-handle.hstyle + .rz-panel .pcard-head{ } /* (handle owns the divider line) */\n\n    /* ============================ Button (mirrors neobrutalism Button variants) ============================ */\n    .btn,.btn-main,.btn-secondary,.btn-danger,.btn-ghost{ display:inline-flex; align-items:center; justify-content:center; gap:6px;\n      height:30px; padding:0 12px; font-size:11px; font-weight:var(--font-weight-heading); cursor:pointer;\n      border:2px solid var(--border); border-radius:var(--radius-base); color:var(--foreground);\n      background:var(--surface-btn); box-shadow:var(--shadow-sm); transition:transform .07s ease, box-shadow .07s ease, background .12s; white-space:nowrap; }   /* v9p2: cream neutral (btn-main/secondary override below) */\n    .btn:hover,.btn-main:hover,.btn-secondary:hover,.btn-danger:hover{ transform:translate(2px,2px); box-shadow:none; }\n    .btn:active,.btn-main:active,.btn-secondary:active,.btn-danger:active{ transform:translate(2px,2px); box-shadow:none; }\n    .btn-main{ background:var(--main); color:var(--main-foreground); }\n    .btn-secondary{ background:var(--secondary); color:var(--secondary-foreground); }\n    .btn-danger{ color:var(--danger); }\n    .btn-danger:hover{ background:#fbe7ee; }\n    .btn-ghost{ border-color:transparent; box-shadow:none; background:transparent; height:auto; padding:4px 6px; }\n    .btn-ghost:hover{ background:rgba(0,24,88,0.06); }\n    .btn-sm{ height:25px; padding:0 9px; font-size:10px; }\n    .btn:disabled,.btn-main:disabled{ opacity:0.4; cursor:not-allowed; box-shadow:var(--shadow-sm); transform:none; }\n    /* link-style text button (amber utility action) */\n    .link-act{ font-size:10px; font-weight:800; color:var(--warning); background:none; border:none; cursor:pointer; padding:0; display:inline-flex; align-items:center; gap:4px; }\n    .link-act:hover{ color:#b06d20; }\n\n    /* ghost icon button (faint at rest, emphasized on hover) */\n    .ghost-ic{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:20px; padding:0;\n      background:transparent; border:none; color:var(--muted-2); cursor:pointer; border-radius:4px; transition:all .12s; }\n    .ghost-ic:hover{ color:var(--foreground); background:rgba(0,24,88,0.08); }\n    .ghost-ic--danger:hover{ color:var(--danger); background:rgba(210,59,106,0.10); }\n    .ghost-ic svg{ width:14px; height:14px; }\n\n    /* ============================ Tabs (panel headers + sub-tabs) ============================ */\n    .tabset{ display:flex; align-items:center; gap:5px; height:100%; }\n    .tab-btn{ display:inline-flex; align-items:center; gap:5px; height:24px; padding:0 9px; font-size:10.5px; font-weight:800;\n      color:var(--muted); background:transparent; border:2px solid transparent; border-radius:var(--radius-base); cursor:pointer; transition:all .1s; }\n    .tab-btn:hover{ color:var(--foreground); }\n    .tab-btn.active{ color:var(--main-foreground); background:var(--main); border-color:var(--border); box-shadow:var(--shadow-sm); }\n\n    /* ============================ Segmented / toggle group (Mode, Effort, Trigger, Payload) ============================ */\n    .seg{ display:flex; border:2px solid var(--border); border-radius:var(--radius-base); overflow:hidden; background:var(--surface-3); }\n    .seg button{ flex:1; min-width:0; padding:6px 2px; font-size:9.5px; font-weight:700; color:var(--muted);\n      background:transparent; border:none; border-right:2px solid var(--border); cursor:pointer; transition:all .1s;\n      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n    .seg button:last-child{ border-right:none; }\n    .seg button:hover:not(.active){ color:var(--foreground); background:rgba(0,24,88,0.05); }\n    .seg button.active{ background:var(--secondary); color:var(--secondary-foreground); font-weight:800; }\n    .seg button.seg-danger{ color:var(--danger); font-weight:800; }\n    .seg button.seg-danger.active{ background:var(--danger); color:#fff; }\n\n    /* ============================ inputs ============================ */\n    .in{ width:100%; background:var(--secondary-background); border:2px solid var(--border); border-radius:var(--radius-base);\n      padding:6px 9px; font-size:11px; font-weight:600; color:var(--foreground); outline:none; transition:box-shadow .1s; }\n    .in:focus{ box-shadow:var(--shadow-sm); }\n    .in::placeholder{ color:var(--muted-2); font-weight:500; }\n    textarea.in{ line-height:1.5; }\n    textarea.autosize{ resize:none; overflow:hidden; min-height:32px; }\n    textarea.ta-resize{ resize:vertical; }\n    .lbl{ display:block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }\n    .in-wrap{ position:relative; display:block; }\n    .in-wrap > input{ padding-right:26px; }\n    .in-x{ position:absolute; top:50%; right:6px; transform:translateY(-50%); width:17px; height:17px; display:inline-flex;\n      align-items:center; justify-content:center; color:var(--muted-2); cursor:pointer; border:none; background:transparent; border-radius:3px; }\n    .in-x:hover{ color:var(--foreground); background:rgba(0,24,88,0.08); }\n    .in-x svg{ width:11px; height:11px; }\n  <\u002Fstyle>\n<\u002Fhead>\n\n<body class=\"bg-background text-foreground font-sans\" style=\"font-weight:var(--font-weight-base)\">\n  <style>\n    /* ============================ agent identity tile (recolorable game-icon) ============================ */\n    .agtile{ display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; overflow:hidden;\n      border:2px solid var(--border); border-radius:var(--radius-base); background:transparent; }\n    .agtile .ag-svg{ width:100%; height:100%; display:block; }\n    .agtile .agtile-luc{ width:62%; height:62%; color:var(--icon-fg); }\n    .agtile--user{ background:var(--ag-user); }\n\n    /* ============================ Team Graph node ============================ */\n    .graph-wrap{ position:re crisper, taller, with a monochrome wayfinding glyph chip — */\n    .pcard-head{ height:38px; min-height:38px; padding:0 11px; gap:10px;\n      box-shadow:inset 0 -1px 0 0 rgba(0,24,88,0.04); }\n    .pcard-head h3{ display:inline-flex; align-items:center; gap:8px; font-size:11px; letter-spacing:0.11em; font-weight:800; }\n    .pcard-ico{ display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; flex:0 0 auto;\n      border:2px solid var(--border); border-radius:4px; background:var(--secondary-background); color:var(--foreground);\n      box-shadow:1px 1px 0 0 var(--border); }\n    .pcard-ico svg{ width:11.5px; height:11.5px; stroke-width:2.4; }\n\n    /* — Elevation tier 1 (resting cards): keep the 2px shadow, add a 1px printed top-highlight — */\n    .node, .rcard{ box-shadow:var(--shadow-sm), inset 0 1px 0 0 rgba(255,255,255,0.65); }\n    .node:hover{ box-shadow:inset 0 1px 0 0 rgba(255,255,255,0.65); }\n    .node.selected, .node.selected:hover{ box-shadow:var(--shadow); }\n    .node{ padding:10px; }\n\n    /* — Team Graph well: a hair more air around the roster — */\n    .graph-grid{ gap:15px; }\n\n    /* — Type rhythm: more legible readout bodies; calmer metadata — */\n    .rc-body{ font-size:11.5px; line-height:1.5; opacity:0.95; }\n    .rc-time, .node-meta, .tl-time{ font-weight:600; }\n    .doc-view{ font-size:12.5px; line-height:1.65; }\n\n    /* — Health bars + status badges: slightly larger, clearer — */\n    .pbar{ height:8px; }\n    .ctxbar{ height:10px; }\n    .node-badge{ padding:2px 7px; font-size:7.5px; }\n\n    /* — Title bar: confident lockup; version pill reads as a stamped chip on the pink — */\n    .topbar{ height:38px; box-shadow:inset 0 -1px 0 0 rgba(0,24,88,0.12); }\n    .topbar .chip{ background:var(--secondary-background); box-shadow:1px 1px 0 0 var(--border); }\n\n    /* — Footer: same stamped-chip treatment so the rails match — */\n    .footbar{ height:36px; }\n\n    /* — Buttons: a touch more padding so lab i>\n                      <span class=\"dbadge db-draft\">Draft<\u002Fspan>\n                      <span class=\"plan-title\">Dashboard layout reflow<\u002Fspan>\n                      <span class=\"plan-ultra\">Ultraplan<\u002Fspan>\n                      <span class=\"plan-meta\">01 lex · 9 steps<\u002Fspan>\n                    <\u002Fbutton>\n                    <div class=\"plan-body\">\n                      <div class=\"plan-desc\">A deep, multi-phase plan (ultraplan) to reflow the three-pane frame and add the Documentation panel without regressing resize behavior.<\u002Fdiv>\n                      <ul class=\"plan-steps\">\n                        <li class=\"done\"><i data-lucide=\"check\"><\u002Fi>Audit the current panel structure &amp; handlers<\u002Fli>\n                        <li class=\"doing\"><i data-lucide=\"loader\"><\u002Fi>Draft the new column reading order<\u002Fli>\n                        <li><span class=\"step-dot\"><\u002Fspan>Move Prompts into the right column<\u002Fli>\n                        <li><span class=\"step-dot\"><\u002Fspan>Insert the Documentation panel<\u002Fli>\n                        <li><span class=\"step-dot\"><\u002Fspan>Verify resize across the nested groups<\u002Fli>\n                      <\u002Ful>\n                      <div class=\"plan-foot\">\n                        <button class=\"btn btn-sm\" onclick=\"planAct('edit')\"><i data-lucide=\"square-pen\" class=\"w-3.5 h-3.5\"><\u002Fi>Edit<\u002Fbutton>\n                        <div class=\"flex-1\"><\u002Fdiv>\n                        <button class=\"btn-danger btn-sm\" onclick=\"planAct('reject')\"><i data-lucide=\"x\" class=\"w-3.5 h-3.5\"><\u002Fi>Reject<\u002Fbutton>\n                        <button class=\"btn-main btn-sm\" onclick=\"planAct('approve')\"><i data-lucide=\"check\" class=\"w-3.5 h-3.5\"><\u002Fi>Approve<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- README.md -->\n              <div id=\"doc-readme\" data-group=\"doc\" class=\"hidden flex-1 min-h-0 flex flex-col p-2.5\">\n                <div class=\"doc-toolbar\">\n                  <span class=\"doc-path\">agent-dashboard/README.md<\u002Fspan>\n                  <span class=\"flex-1\"><\u002Fspan>\n                  <button class=\"ghost-ic\" title=\"Copy\" onclick=\"copyField('doc-readme-view')\"><i data-lucide=\"copy\"><\u002Fi><\u002Fbutton>\n                  <button class=\"btn btn-sm doc-edit-btn\" onclick=\"docEdit(this,'readme')\"><i data-lucide=\"square-pen\" class=\"w-3.5 h-3.5\"><\u002Fi>Edit<\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"doc-view\" id=\"doc-readme-view\">\n                  <h4>AWL Multi-Agent Dashboard<\u002Fh4>\n                  <p>A control surface for running and supervising a team of Claude Code agents from one window. Watch the team, steer each agent, and review their work without leaving the dashboard.<\u002Fp>\n                  <h5>The five panels<\u002Fh5>\n                  <ul>\n                    <li><b>Agent<\u002Fb> — inspect &amp; configure the selected agent: role, model, mode, lifecycle, context, history.<\u002Fli>\n                    <li><b>Team Graph<\u002Fb> — every agent as a live card: status, turns, and context usage at a glance.<\u002Fli>\n                    <li><b>Documentation<\u002Fb> — plans plus the project docs (README, CLAUDE, TODO) in one place.<\u002Fli>\n                    <li><b>Feed<\u002Fb> — messages, scratchpad, log, and the requests awaiting your input.<\u002Fli>\n                    <li><b>Prompts<\u002Fb> — compose, template, and dispatch prompts to one or many agents.<\u002Fli>\n                  <\u002Ful>\n                  <h5>Design system<\u002Fh5>\n                  <p>Neobrutalism: hard <code>4px<\u002Fcode> shadows, 2px borders, a warm cream canvas, and a single pink-to-teal emphasis ladder. The wireframe mockups in <a href=\"#\">agent-dashboard/design/<\u002Fa> own the exact visuals.<\u002Fp>\n                <\u002Fdiv>\n                <textarea class=\"doc-edit in\" id=\"doc-readme-edit\" style=\"display:none\"># AWL Multi-Agent Dashboard\n\nA control surface for running and supervising a team of Claude Code agents\nfrom one window. Watch the team, steer each agent, and review their work\nwithout leaving the dashboard.\n\n## The five panels\n- **Agent** — inspect &amp; configure the selected agent.\n- **Team Graph** — every agent as a live card.\n- **Documentation** — plans + project docs (README, CLAUDE, TODO).\n- **Feed** — messages, scratchpad, log, requests.\n- **Prompts** — compose and dispatch prompts.\n\n## Design system\nNeobrutalism: hard 4px shadows, 2px borders, a warm cream canvas, and a\nsingle pink-to-teal emphasis ladder.<\u002Ftextarea>\n              <\u002Fdiv>\n\n              <!-- CLAUDE.md -->\n              <div id=\"doc-claude\" data-group=\"doc\" class=\"hidden flex-1 min-h-0 flex flex-col p-2.5\">\n                <div class=\"doc-toolbar\">\n                  <span class=\"doc-path\">CLAUDE.md<\u002Fspan>\n                  <span class=\"flex-1\"><\u002Fspan>\n                  <button class=\"ghost-ic\" title=\"Copy\" onclick=\"copyField('doc-claude-view')\"><i data-lucide=\"copy\"><\u002Fi><\u002Fbutton>\n                  <button class=\"btn btn-sm doc-edit-btn\" onclick=\"docEdit(this,'claude')\"><i data-lucide=\"square-pen\" class=\"w-3.5 h-3.5\"><\u002Fi>Edit<\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"doc-view\" id=\"doc-claude-view\">\n                  <h4>CLAUDE.md<\u002Fh4>\n                  <p>Project instructions loaded into every agent's context. Keep it short — it is spent context on every turn.<\u002Fp>\n                  <h5>Workspace identity<\u002Fh5>\n                  <p>A general-purpose VS Code workspace for AI/agentic workflows. Current focus: the AWL multi-agent dashboard. Files outside the project directory are real and permanent.<\u002Fp>\n                  <h5>Behavioral rules<\u002Fh5>\n                  <ul>\n                    <li>Stay inside the project directory unless told otherwise.<\u002Fli>\n                    <li>Keep <code>DEVLOG.md<\u002Fcode> current — an unlogged change never happened.<\u002Fli>\n                    <li>Write transient artifacts into <code>.scratch/<\u002Fcode>, never the repo root.<\u002Fli>\n                    <li>Preserve everything you weren't asked to change.<\u002Fli>\n                  <\u002Ful>\n                <\u002Fdiv>\n                <textarea class=\"doc-edit in\" id=\"doc-claude-edit\" style=\"display:none\"># CLAUDE.md\n\nProject instructions loaded into every agent's context. Keep it short — it is\nspent context on every turn.\n\n## Workspace identity\nA general-purpose VS Code workspace for AI/agentic workflows. Current focus:\nthe AWL multi-agent dashboard.\n\n## Behavioral rules\n- Stay inside the project directory unless told otherwise.\n- Keep DEVLOG.md current — an unlogged change never happened.\n- Write transient artifacts into .scratch/, never the repo root.\n- Preserve everything you weren't asked to change.<\u002Ftextarea>\n              <\u002Fdiv>\n\n              <!-- TODO.md -->\n              <div id=\"doc-todo\" data-group=\"doc\" class=\"hidden flex-1 min-h-0 flex flex-col p-2.5\">\n                <div class=\"doc-toolbar\">\n                  <span class=\"doc-path\">TODO.md<\u002Fspan>\n                  <span class=\"flex-1\"><\u002Fspan>\n                  <button class=\"ghost-ic\" title=\"Copy\" onclick=\"copyField('doc-todo-view')\"><i data-lucide=\"copy\"><\u002Fi><\u002Fbutton>\n                  <button class=\"btn btn-sm doc-edit-btn\" onclick=\"docEdit(this,'todo')\"><i data-lucide=\"square-pen\" class=\"w-3.5 h-3.5\"><\u002Fi>Edit<\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"doc-view\" id=\"doc-todo-view\">\n                  <h4>TODO.md<\u002Fh4>\n                  <h5>Next up<\u002Fh5>\n                  <ul>\n                    <li>Context-cutoff shading on the usage bars<\u002Fli>\n                    <li>Turns on its own line in the Team Graph card<\u002Fli>\n                    <li>Documentation panel (Plan + README/CLAUDE/TODO)<\u002Fli>\n                    <li>Layout reflow: Agent · Team Graph · Documentation · Feed · Prompts<\u002Fli>\n                  <\u002Ful>\n                  <h5>Quick wins<\u002Fh5>\n                  <ul>\n                    <li>Output export beyond per-card copy<\u002Fli>\n                    <li>Jump-to-start / jump-to-end on each feed<\u002Fli>\n                  <\u002Ful>\n                  <hr class=\"doc-hr\">\n                  <p>The full backlog lives in <code>docs/human-notes-misc.md<\u002Fcode> under \"Dashboard Add / Update Notes.\"<\u002Fp>\n                <\u002Fdiv>\n                <textarea class=\"doc-edit in\" id=\"doc-todo-edit\" style=\"display:none\"># TODO.md\n\n## Next up\n- [ ] Context-cutoff shading on the usage bars\n- [ ] Turns on its own line in the Team Graph card\n- [ ] Documentation panel (Plan + README/CLAUDE/TODO)\n- [ ] Layout reflow: Agent / Team Graph / Documentation / Feed / Prompts\n\n## Quick wins\n- [ ] Output export beyond per-card copy\n- [ ] Jump-to-start / jump-to-end on each feed\n\nFull backlog: docs/human-notes-misc.md<\u002Ftextarea>\n              <\u002Fdiv>\n\n            <\u002Fdiv><!-- /pcard-body -->\n          <\u002Fsection>\n\n        <\u002Fdiv><!-- /rz-group vertical -->\n      <\u002Fdiv><!-- /rz-panel pMid -->\n\n      <div class=\"rz-handle vstyle\" data-orient=\"h\"><span class=\"rz-grip\"><i data-lucide=\"grip-vertical\" class=\"w-2.5 h-2.5\"><\u002Fi><\u002Fspan><\u002Fdiv>\n\n      <!-- ============ RIGHT COLUMN: FEED + PROMPTS (v9p7 A4) ============ -->\n      <div class=\"rz-panel\" id=\"pRight\" style=\"flex:1 1 36%; min-width:340px\">\n        <div class=\"rz-group vertical\" i ><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">tester<\u002Fspan><span class=\"ag-name\">01 nova<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow on\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#007f91\"><svg class=\"ag-svg\"><use href=\"#ag-eagle\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">reviewer<\u002Fspan><span class=\"ag-name\">01 vega<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#af3c3a\"><svg class=\"ag-svg\"><use href=\"#ag-centurion\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">planner<\u002Fspan><span class=\"ag-name\">01 quinn<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow on\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#876300\"><svg class=\"ag-svg\"><use href=\"#ag-parrot\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">docs<\u002Fspan><span class=\"ag-name\">01 wren<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow on\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#9e3f84\"><svg class=\"ag-svg\"><use href=\"#ag-tribal\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">designer<\u002Fspan><span class=\"ag-name\">01 lex<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow on\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#008370\"><svg class=\"ag-svg\"><use href=\"#ag-astronaut\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">ops<\u002Fspan><span class=\"ag-name\">01 sage<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#4d5ebe\"><svg class=\"ag-svg\"><use href=\"#ag-thirdeye\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">analyst<\u002Fspan><span class=\"ag-name\">01 io<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n              <button class=\"agrow on\" onclick=\"toggleAgRow(this)\"><span class=\"agtile\" style=\"color:#9d5400\"><svg class=\"ag-svg\"><use href=\"#ag-cowled\"><\u002Fuse><\u002Fsvg><\u002Fspan><span class=\"ag-lab\"><span class=\"ag-role\">scribe<\u002Fspan><span class=\"ag-name\">01 fen<\u002Fspan><\u002Fspan><i data-lucide=\"check\" class=\"ag-ck\"><\u002Fi><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- feed content -->\n          <div class=\"flex-1 min-w-0 flex flex-col overflow-hidden\">\n\n            <!-- MESSAGES -->\n            <div id=\"feed-messages\" data-group=\"feed\" class=\"flex-1 overflow-y-auto px-3 pt-1 pb-3\" style=\"background:var(--background)\">\n              <div class=\"minibar sticky top-0 z-10\" style=\"background:var(--secondary-background);border-bottom:2px solid var(--border)\">\n                <span class=\"mini-cap\">Show<\u002Fspan>\n                <button class=\"minitog on\" onclick=\"miniToggle(this)\" title=\"Messages you sent to the team\"><i data-lucide=\"arrow-up-right\"><\u002Fi>Sent<\u002Fbutton>\n                <button class=\"minitog on\" onclick=\"miniToggle(this)\" title=\"Messages received from agents\"><i data-lucide=\"arrow-down-left\"><\u002Fi>Received<\u002Fbutton>\n                <span class=\"mini-div\"><\u002Fspan>\n                <span class=\"mini-cap\">Include<\u002Fspan>\n                <button class=\"minitog on\" onclick=\"miniToggle(this)\">Thinking<\u002Fbutton>\n                <button class=\"minitog\" onclick=\"miniToggle(this)\">Read<\u002Fbutton>\n                <button class=\"minitog\" onclick=\"miniToggle(this)\">Write<\u002Fbutton>\n                <button class=\"minitog\" onclick=\"miniToggle(this)\">Bash<\u002Fbutton>\n                <button class=\"minitog\" onclick=\"miniToggle(this)\">Diffs<\u002Fbutton>\n                <button class=\"minitog\" onclick=\"miniToggle(this)\">Metadata<\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"flex flex-col gap-2 mt-2\">\n                <div class=\"rcard\" onclick=\"selectMsgCard(this)\"><div class=\"flex items-center gap-2\"><span class=\"rc-name\" style=\"color:#008149\">researcher-01-sandy<\u002Fspan><span class=\"dir-tag dir-in\">recv<\u002Fspan><span class=\"rc-time ml-auto\">14:41<\u002Fspan><\u002Fdiv><div class=\"rc-body\">Found 3 auth vulnerabilities in the JWT middleware. Token refresh doesn't validate expiry before issuing a new token, so an attacker can keep a session alive indefinitely once they hold any refresh token.<\u002Fdiv><\u002Fdiv>\n                <div class=\"rcard\" onclick=\"selectMsgCard(this)\"><div class=\"flex items-center gap-2\"><span class=\"rc-name text-foreground\">User<\u002Fspan><span class=\"dir-tag dir-out\">sent<\u002Fspan><span class=\"rc-time ml-auto\">14:42<\u002Fspan><\u002Fdiv><div class=\"rc-body\">Confirm the expiry bypass with auditor-01 and draft a remediation plan to the scratchpad.<\u002Fdiv><\u002Fdiv>\n                <div class=\"rcard\" onclick=\"selectMsgCard(this)\"><div class=\"flex items-center gap-2\"><span class=\"rc-name\" style=\"color:#387b12\">auditor-01-drew<\u002Fspan><span class=\"dir-tag dir-in\">recv<\u002Fspan><span class=\"rc-time ml-auto\">14:43<\u002Fspan><\u002Fdiv><div class=\"rc-body\">Confirmed 2 of 3 vulns. Expiry bypass is critical — tokens refresh indefinitely. Demoted \"no rate limiting\" to medium; it's behind the gateway throttle.<\u002Fdi ef-meta\"><span class=\"ref-hex\">#d23b4a<\u002Fspan><span class=\"ref-name\">req · permission<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#cf7a2c\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#cf7a2c<\u002Fspan><span class=\"ref-name\">req · approval<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#a9710f\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#a9710f<\u002Fspan><span class=\"ref-name\">req · decision<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#7b7fa6\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#7b7fa6<\u002Fspan><span class=\"ref-name\">--ag-user / idle<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ref-group\">\n        <div class=\"ref-group-label\">Agent identity<\u002Fdiv>\n        <div class=\"ref-chips\">\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#aa3a61\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#aa3a61<\u002Fspan><span class=\"ref-name\">crimson<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#af3c3a\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#af3c3a<\u002Fspan><span class=\"ref-name\">vermilion<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#aa4600\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#aa4600<\u002Fspan><span class=\"ref-name\">amber<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#9d5400\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#9d5400<\u002Fspan><span class=\"ref-name\">gold<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#876300\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#876300<\u002Fspan><span class=\"ref-name\">citron<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#687100\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#687100<\u002Fspan><span class=\"ref-name\">lime<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#387b12\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#387b12<\u002Fspan><span class=\"ref-name\">fern<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#008149\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#008149<\u002Fspan><span class=\"ref-name\">emerald<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#008370\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#008370<\u002Fspan><span class=\"ref-name\">teal<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#007f91\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#007f91<\u002Fspan><span class=\"ref-name\">cyan<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#0076ab\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#0076ab<\u002Fspan><span class=\"ref-name\">azure<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#006bbb\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#006bbb<\u002Fspan><span class=\"ref-name\">cobalt<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#4d5ebe\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#4d5ebe<\u002Fspan><span class=\"ref-name\">indigo<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#7152b5\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#7152b5<\u002Fspan><span class=\"ref-name\">violet<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#8b48a0\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#8b48a0<\u002Fspan><span class=\"ref-name\">orchid<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"ref-chip\"><div class=\"ref-sw\" style=\"background:#9e3f84\"><\u002Fdiv><div class=\"ref-meta\"><span class=\"ref-hex\">#9e3f84<\u002Fspan><span class=\"ref-name\">magenta<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n  /* ===== Lucide render helper (UI icons) ===== */\n  function LU(){ if(window.lucide&&lucide.createIcons) lucide.createIcons({attrs:{'stroke-width':2.25}}); }\n\n  /* ===== tabs ===== */\n  function switchTab(g,t){\n    document.querySelectorAll('[data-group=\"'+g+'\"]').forEach(p=>p.classList.add('hidden'));\n    const pane=document.getElementById(g+'-'+t); if(pane)pane.classList.remove('hidden');\n    document.querySelectorAll('[data-tab-group=\"'+g+'\"]').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));\n    const foots=document.querySelectorAll('[data-group=\"'+g+'-foot\"]');\n    if(foots.length){foots.forEach(f=>f.classList.add('hidden'));const fm=document.getElementById(g+'-foot-'+t);if(fm)fm.classList.remove('hidden');}\n    if(g==='prompt'){\n      const ar=document.getElementById('prompt-actions'); if(ar)ar.classList.toggle('hidden',t==='history');\n      const rv=document.getElementById('revise-split'); if(rv)rv.classList.toggle('hidden',t!=='compose');\n      const ha=document.getElementById('prompt-history-actions'); if(ha)ha.classList.toggle('hidden',t!=='history');\n    }\n    const s=JSON.parse(localStorage.getItem('awl-v8')||'{}');s[g]=t;localStorage.setItem('awl-v8',JSON.stringify(s));\n    if(g==='feed'){ const ma=document.getElementById('feed-messages-actions'); if(ma)ma.classList.toggle('hidden',t!=='messages'); drawEdgesSoon(); }\n  }\n  /* ===== generic interactions (ported from v7p3) ===== */\n  function toggleDrawer(){document.getElementById('link-drawer').classList.toggle('hidden');}\n  function agSync(scope){const link=scope.querySelector('[data-allnone]');if(!link)return;const rows=[...scope.querySelectorAll('.agrow')];const allOn=rows.length>0&&rows.every(r=>r.classList.contains('on'));link.dataset.act=allOn?'none':'all';link.textContent=allOn?'None':'All';}  /* show only the useful action */\n  function toggleAgRow(el){el.classList.toggle('on');const sc=el.closest('[data-agscope]');if(sc)agSync(sc);}   /* multi-select (Target / Filter) */\n  function pickAgRow(el){const w=el.closest('.aglist')||el.parentElement;w.querySelectorAll('.agrow').forEach(c=>c.classList.remove('on'));el.classList.add('on');} /* single-select (Source) */\n  function agAllNone(btn){const s=btn.closest('[data-agscope]');if(!s)return;const on=btn.dataset.act!=='none';s.querySelectorAll('.agrow').forEach(r=>r.classList.toggle('on',on));agSync(s);}  /* contextual All / None toggle */\n  function segPick(b){const g=b.closest('.seg');g.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');}\n  function pickOpt(el){const p=el.parentElement;p.querySelectorAll('.opt').forEach(o=>o.classList.remove('on'));el.classList.add('on');}\n  function pickDecision(el){const c=el.closest('.rcard');c.querySelectorAll('.opt').forEach(o=>o.classList.remove('on'));el.classList.add('on');const ap=c.querySelector('.dec-approve');if(ap)ap.disabled=false;}\n  function miniToggle(el){el.classList.toggle('on');}\n  function toggleSplitMenu(btn){const m=btn.parentElement.querySelector('.split-menu');const open=m.classList.contains('open');closeAllPopups();if(!open)m.classList.add('open');}\n  function pickSplit(mi){const menu=mi.closest('.split-menu');menu.querySelectorAll('.split-mi').forEach(x=>x.classList.toggle('sel',x===mi));const l=menu.closest('.split').querySelector('.split-lbl');if(l){const base=mi.dataset.short||mi.querySelector('b').textContent;l.textContent=(l.dataset.prefix||'')+base;}menu.classList.remove('open');}\n  function clearField(id){const el=document.getElementById(id);if(el){el.value='';if(el.classList.contains('autosize'))autosize(el);el.focus();}}\n  function clearInput(b){const i=b.closest('.tpl-fill,.in-wrap,div').querySelector('input,textarea');if(i){i.value='';i.focus();}}\n  function copyField(id){const el=document.getElementById(id);if(el&&navigator.clipboard)navigator.clipboard.writeText(el.value||el.textContent||'').catch(()=>{});}\n  function copyCard(b){const c=b.closest('.rcard');const x=c?c.querySelector('.rc-body,.rc-log'):null;if(x&&navigator.clipboard)navigator.clipboard.writeText(x.textContent||'').catch(()=>{});}\n  function replyTo(name){switchTab('prompt','compose');const w=document.getElementById('prompt-targets');if(w){const cs=[...w.querySelectorAll('.agrow')];cs.forEach(c=>c.classList.remove('on'));const m=cs.find(c=>{const n=c.querySelector('.ag-name');return n&&n.textContent.trim()===name;});if(m){m.classList.add('on');m.scrollIntoView({block:'nearest'});}agSync(w);}const pc=document.getElementById('pPrompts');if(pc){pc.classList.add('reply-flash');setTimeout(()=>pc.classList.remove('reply-flash'),900);}const f=document.getElementById('compose-field');if(f)f.focus();}\n  function cycleDir(b){const o=['ab','ba','both'],g={ab:'→',ba:'←',both:'↔'},t={ab:'A → B',ba:'B → A',both:'A ↔ B (both)'};let i=(o.indexOf(b.dataset.dir)+1)%3;b.dataset.dir=o[i];b.textContent=g[o[i]];b.title=t[o[i]];}\n  function toggleLimit(b){b.classList.toggle('on');const i=b.parentElement.querySelector('.lim-in');if(i)i.disabled=!b.classList.contains('on');}\n  function toggleEdit(b){b.closest('.field').classList.toggle('editing');}\n  function step(b,d){const i=b.parentElement.querySelector('input');if(!i)return;let v=parseInt(i.value||'0',10)+d;const mn=i.min!==''?parseInt(i.min,10):0;if(!isNaN(mn))v=Math.max(mn,v);const mx=i.max!==''?parseInt(i.max,10):null;if(mx!==null&&!isNaN(mx))v=Math.min(mx,v);i.value=v;}\n  function autosize(el){el.style.height='auto';const cs=getComputedStyle(el);const b=(parseFloat(cs.borderTopWidth)||0)+(parseFloat(cs.borderBottomWidth)||0);el.style.height=(el.scrollHeight+b)+'px';}\n  function autosizeAll(){document.querySelectorAll('textarea.autosize').forEach(autosize);}\n  function selectLibRow(el){el.parentElement.querySelectorAll('.lib-row').forEach(r=>r.classList.remove('on'));el.classList.add('on');}\n\n  /* ===== v9p7 (A3): Documentation panel — Plan expand/collapse + doc viewer edit toggle ===== */\n  function togglePlan(head){const c=head.closest('.plan-card');if(c)c.classList.toggle('open');LU();}\n  function docEdit(btn,name){const view=document.getElementById('doc-'+name+'-view');const edit=document.getElementById('doc-'+name+'-edit');if(!view||!edit)return;\n    const editing=edit.style.display!=='none';\n    if(editing){edit.style.display='none';view.style.display='';btn.innerHTML='<i data-lucide=\"square-pen\" class=\"w-3.5 h-3.5\"><\u002Fi>Edit';}\n    else{view.style.display='none';edit.style.display='block';btn.innerHTML='<i data-lucide=\"check\" class=\"w-3.5 h-3.5\"><\u002Fi>Save';edit.focus();}\n    LU();}\n  function docAdd(){/* opens a picker to add another doc to organize here — wired in the real build (mock) */}\n  function planAct(a){/* edit / approve / reject the selected plan — wired to the runtime in the real build (mock) */}\n\n  function closeAllPopups(){document.querySelectorAll('.split-menu.open,.fmt-menu.open,.picker-pop.open,.combo-pop.open,.msel-pop.open,.src-pop.open').forEach(x=>x.classList.remove('open'));}\n\n  /* ===== library placeholders ===== */\n  let phSel=null;\n  function pickPlaceholder(el){document.querySelectorAll('.ph-text').forEach(p=>p.classList.remove('sel'));el.classList.add('sel');phSel=el;const ta=document.getElementById('tpl-fill-input');if(!ta)return;ta.setAttribute('placeholder',el.dataset.tag||'');ta.value=el.dataset.value||'';autosize(ta);ta.focus();}\n  function fillPlaceholder(){if(!phSel)return;const ta=document.getElementById('tpl-fill-input');const v=ta.value.trim();phSel.dataset.value=v;if(v){phSel.classList.add('filled');phSel.textContent=v;}else{phSel.classList.remove('filled');phSel.textContent=phSel.dataset.tag;}phSel.classList.add('sel');}\n  function resetPlaceholder(){if(!phSel)return;phSel.dataset.value='';phSel.classList.remove('filled');phSel.textContent=phSel.dataset.tag;const ta=document.getElementById('tpl-fill-input');if(ta){ta.value='';autosize(ta);ta.focus();}}\n\n  /* ===== node selection ===== */\n  function selectNode(n){\n    document.querySelectorAll('.node').forEach(x=>x.classList.remove('selected'));\n    n.classList.add('selected');\n  }\n\n  /* ===== pickers (Color = Select · Icon = Combobox) ===== */\n  const AGENT_ICONS=[\n    ['ag-wizard','wizard-face'],['ag-golem','metal-golem-head'],['ag-gasmask','gas-mask'],['ag-robot','robot-helmet'],\n    ['ag-fox','fox-head'],['ag-spider','spider-mask'],['ag-eagle','eagle-head'],['ag-centurion','centurion-helmet'],\n    ['ag-parrot','parrot-head'],['ag-tribal','tribal-mask'],['ag-astronaut','astronaut-helmet'],['ag-thirdeye','third-eye'],\n    ['ag-cowled','cowled'],['ag-wolf','wolf-head'],['ag-bear','bear-head'],['ag-tiger','tiger-head'],['ag-dragon','dragon-head'],\n    ['ag-skull','skull-mask'],['ag-ninja','ninja-head'],['ag-viking','viking-head'],['ag-samurai','samurai-helmet'],\n    ['ag-oni','oni'],['ag-goblin','goblin-head'],['ag-ogre','ogre'],['ag-vampire','vampire-dracula'],['ag-witch','witch-face'],\n    ['ag-pumpkin','pumpkin-mask'],['ag-cyborg','cyborg-face'],['ag-mecha','mecha-head']];\n  function buildIconGrids(){\n    const html=AGENT_ICONS.map(([id,nm])=>'<button class=\"icotile\" data-name=\"'+nm+'\" title=\"'+nm+'\" onclick=\"pickIconChoice(this)\"><span class=\"agtile\" style=\"color:var(--cur-color)\"><svg class=\"ag-svg\"><use href=\"#'+id+'\"/><\u002Fsvg><\u002Fspan><\u002Fbutton>').join('');\n    document.querySelectorAll('[data-icogrid]').forEach(g=>g.innerHTML=html);\n  }\n  function curColorHost(el){let p=el;while(p&&p!==document.body){if(p.style&&p.style.getPropertyValue('--cur-color'))return p;p=p.parentElement;}return null;}\n  function togglePicker(btn){\n    const pick=btn.closest('.picker'),pop=pick.querySelector('.picker-pop');const open=pop.classList.contains('open');\n    closeAllPopups(); if(open)return;\n    const r=btn.getBoundingClientRect(); pop.classList.toggle('up', r.bottom>window.innerHeight-260);\n    pop.classList.add('open');\n    const s=pop.querySelector('.picker-search input'); if(s){s.value='';filterIconsGrid(pop,'');setTimeout(()=>s.focus({preventScroll:true}),0);}\n  }\n  function pickColor(el){\n    const grid=el.closest('[data-colorgrid]');grid.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));el.classList.add('on');\n    const pick=el.closest('.picker');pick.querySelector('.picker-sw').style.background=el.style.background;pick.querySelector('.picker-val').textContent=el.dataset.name;\n    const host=curColorHost(pick); if(host)host.style.setProperty('--cur-color',el.style.background);\n    pick.querySelector('.picker-pop').classList.remove('open');\n  }\n  function pickIconChoice(el){\n    const pop=el.closest('.picker-pop'),pick=el.closest('.picker');\n    pop.querySelectorAll('.icotile').forEach(t=>t.classList.remove('on'));el.classList.add('on');\n    const href=el.querySelector('use').getAttribute('href');\n    pick.querySelector('.picker-ico use').setAttribute('href',href);\n    pick.querySelector('.picker-val').textContent=el.dataset.name;\n    pop.classList.remove('open');\n  }\n  function filterIconsGrid(pop,q){const g=pop.querySelector('[data-icogrid]');if(!g)return;q=q.toLowerCase();g.querySelectorAll('.icotile').forEach(t=>{t.style.display=t.dataset.name.toLowerCase().includes(q)?'':'none';});}\n  function filterIcons(input){filterIconsGrid(input.closest('.picker-pop'),input.value);}\n\n  /* ===== MODEL button groups ===== */\n  const MODELS={inherit:[],opus:['4.8','4.6','4.5','4.1'],sonnet:['4.6','4.5','3.7'],haiku:['4.5','3.5'],fable:['5']};\n  const DEFV={opus:'4.8',sonnet:'4.6',haiku:'4.5',fable:'5'};\n  document.querySelectorAll('.model-tabs').forEach(tabs=>{\n    const wrap=tabs.parentElement,ver=tabs.nextElementSibling,curEl=wrap.querySelector('#model-current,.model-cur');\n    const act=tabs.querySelector('.model-tab.active');\n    const st={model:act?act.dataset.model:'opus',ver:Object.assign({},DEFV)};\n    const label=()=>st.model==='inherit'?'inherit ← parent':st.model+' '+st.ver[st.model];\n    function renderVer(){const vs=MODELS[st.model]||[];if(!vs.length){ver.classList.remove('open');ver.innerHTML='';return;}\n      ver.innerHTML=vs.map(v=>'<div class=\"ver-row'+(v===st.ver[st.model]?' sel':'')+'\" data-v=\"'+v+'\"><span class=\"ver-name\">'+st.model+'-'+v+'<\u002Fspan><span class=\"ver-check\">✓<\u002Fspan><\u002Fdiv>').join('');\n      ver.querySelectorAll('.ver-row').forEach(r=>r.onclick=()=>{st.ver[st.model]=r.dataset.v;if(curEl)curEl.textContent=label();ver.classList.remove('open');renderVer();});\n      ver.classList.add('open');}\n    tabs.querySelectorAll('.model-tab').forEach(t=>t.onclick=()=>{const m=t.dataset.model;if(st.model===m&&ver.classList.contains('open')){ver.classList.remove('open');return;}st.model=m;tabs.querySelectorAll('.model-tab').forEach(x=>x.classList.toggle('active',x===t));if(curEl)curEl.textContent=label();renderVer();});\n    if(curEl)curEl.textContent=label();\n  });\n\n  /* ===== CONTEXT breakdown ===== */\n  const CTX={model:'claude-opus-4-8',used:'399.1k',total:'1.0M',pct:40,cats:[\n    {nm:'System prompt',tk:'1.5k',pc:'0.2%',c:'#0076ab'},{nm:'System tools',tk:'5.1k',pc:'0.5%',c:'#007f91'},\n    {nm:'MCP tools',tk:'27.5k',pc:'2.8
