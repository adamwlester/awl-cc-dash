<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWL Dashboard — Palette Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#1a1a22; color:#ccc; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .tab-bar { display:flex; gap:4px; padding:10px 14px; background:#111116; border-bottom:1px solid #2a2a33; flex-wrap:wrap; align-items:center; }
    .tab-bar .label { font-size:11px; color:#666; margin-right:6px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
    .tab-btn { font-family:'Inter',sans-serif; font-size:11px; font-weight:600; padding:7px 14px; border:2px solid transparent; border-radius:999px; cursor:pointer; transition:all 0.15s; background:#1e1e28; color:#888; }
    .tab-btn:hover { background:#2a2a36; color:#bbb; }
    .tab-btn.active { color:#fff; border-color:currentColor; }

    .theme-panel { display:none; flex:1; overflow-y:auto; padding:24px; }
    .theme-panel.visible { display:block; }

    .theme-header { margin-bottom:20px; }
    .theme-name { font-size:22px; font-weight:800; margin-bottom:4px; letter-spacing:-0.02em; }
    .theme-desc { font-size:13px; line-height:1.5; max-width:600px; }

    /* Demo components — rounded, bold, illustrated feel */
    .demo { border-radius:16px; overflow:hidden; max-width:680px; border-width:2px; border-style:solid; }
    .demo-header { padding:12px 18px; display:flex; align-items:center; justify-content:space-between; font-size:13px; font-weight:700; border-bottom-width:2px; border-bottom-style:solid; }
    .demo-tabs { display:flex; gap:0; padding:0 18px; font-size:12px; font-weight:600; border-bottom-width:2px; border-bottom-style:solid; }
    .demo-tabs span { padding:8px 14px; border-bottom:3px solid transparent; cursor:default; }
    .demo-body { padding:18px; }

    .seg { display:inline-flex; border-radius:999px; overflow:hidden; font-size:11px; font-weight:700; border-width:2px; border-style:solid; }
    .seg span { padding:6px 14px; cursor:default; transition:all 0.1s; }

    .btn-row { display:flex; gap:8px; margin-top:14px; }
    .btn { font-family:'Inter',sans-serif; font-size:12px; font-weight:700; padding:9px 22px; border:2px solid transparent; border-radius:999px; cursor:default; letter-spacing:-0.01em; }

    .pills { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .pill { display:inline-flex; align-items:center; gap:7px; padding:6px 14px 6px 8px; border-radius:999px; font-size:12px; font-weight:600; border-width:2px; border-style:solid; }

    .input-demo { width:100%; padding:10px 14px; border-radius:12px; font-size:13px; font-family:'Inter',sans-serif; outline:none; border-width:2px; border-style:solid; font-weight:500; }

    .feed { margin-top:14px; font-size:12px; line-height:1.7; }
    .feed-item { padding:10px 0; }
    .feed-name { font-weight:700; font-size:12px; }

    .progress-track { height:8px; border-radius:4px; overflow:hidden; margin-top:6px; width:200px; }
    .progress-fill { height:100%; border-radius:4px; }

    .icon-circle { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; border-width:2px; border-style:solid; }

    .divider { height:2px; margin:16px 0; border-radius:1px; }

    .swatches { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
    .swatch-box { width:52px; height:36px; border-radius:8px; margin-bottom:4px; border:2px solid rgba(0,0,0,0.1); }
    .swatch-label { font-size:9px; font-family:'JetBrains Mono',monospace; text-align:center; }

    .demo-row { display:flex; gap:16px; margin-top:16px; flex-wrap:wrap; }
    .demo-row > div { flex:1; min-width:300px; }

    .badge { font-size:10px; font-weight:700; padding:4px 10px; border-radius:999px; display:inline-block; }
  </style>
</head>
<body>
